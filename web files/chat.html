<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat - Evolution Studios</title>
  <style>
    body {
      font-family: 'DM Sans', sans-serif;
      background: #f6fbfc;
      margin: 0;
      padding: 40px 20px;
    }
    h1 {
      text-align: center;
      color: #1a2b30;
    }
    #chat-container {
      max-width: 600px;
      margin: auto;
    }
    #chat-box {
      height: 400px;
      overflow-y: auto;
      border: 1px solid #e2eff2;
      padding: 16px;
      background: #111;
      color: #fff;
      border-radius: 16px;
      margin-bottom: 12px;
    }
    #chat-box p { margin: 8px 0; line-height: 1.5; }
    .input-row {
      display: flex;
      gap: 10px;
    }
    #chat-input {
      flex: 1;
      padding: 12px 16px;
      font-size: 15px;
      border: 1px solid #e2eff2;
      border-radius: 50px;
      outline: none;
    }
    button {
      padding: 12px 24px;
      background: #0db4c4;
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #0a95a3; }
  </style>
</head>
<body>
  <h1>Chat with our AI</h1>
  <div id="chat-container">
    <div id="chat-box"></div>
    <div class="input-row">
      <input id="chat-input" type="text" placeholder="Ask me anything...">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

<script>
async function sendMessage() {
  const input = document.getElementById('chat-input');
  const box = document.getElementById('chat-box');
  const message = input.value.trim();
  if (!message) return;

  box.innerHTML += `<p><b style="color:#0db4c4">You:</b> ${message}</p>`;
  input.value = '';
  box.scrollTop = box.scrollHeight;

  box.innerHTML += `<p id="thinking"><b style="color:#aaa">AI:</b> Thinking...</p>`;

  try {
    const response = await fetch('https://occasion-caps-probably-measurements.trycloudflare.com/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'llama3.2',
        messages: [{ role: 'user', content: message }],
        stream: false
      })
    });

    const data = await response.json();
    document.getElementById('thinking').outerHTML = `<p><b style="color:#0db4c4">AI:</b> ${data.message.content}</p>`;
  } catch (err) {
    document.getElementById('thinking').outerHTML = `<p style="color:red">Error connecting to AI. Make sure the tunnel is running.</p>`;
  }
  box.scrollTop = box.scrollHeight;
}

document.getElementById('chat-input').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') sendMessage();
});
</script>
</body>
</html>
